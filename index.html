<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="쿠팡 로켓배송 반품·할인 노트북 실시간 딜 모음. 가격 하락 알림은 텔레그램 채널에서.">
<title>노트북 핫딜 알리미</title>
<style>
:root {
  --primary: #e8380d;
  --primary-light: #fff0ed;
  --bg: #f4f5f7;
  --card: #ffffff;
  --text: #191919;
  --text2: #666;
  --border: #e8e8e8;
  --tg: #229ED9;
  --radius: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

/* ── 헤더 ── */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 0;
  position: sticky; top: 0; z-index: 10;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.site-title { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.site-title span { font-size: 20px; }
.tg-btn {
  background: var(--tg); color: #fff; border: none; border-radius: 20px;
  padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
  text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
}

/* ── 탭 ── */
.tabs { display: flex; gap: 0; }
.tab {
  flex: 1; padding: 10px 4px; text-align: center; font-size: 14px; font-weight: 600;
  color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .15s;
}
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* ── 업데이트 시간 ── */
.updated-bar {
  text-align: center; font-size: 11px; color: var(--text2);
  padding: 8px 16px; background: var(--bg);
}

/* ── 카드 그리드 ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px; padding: 10px 12px;
}
@media (min-width: 480px) { .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }
@media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; padding: 14px 20px; } }

/* ── 딜 카드 ── */
.card {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
  overflow: hidden; display: flex; flex-direction: column; position: relative;
}
.card-badge {
  background: var(--primary); color: #fff; font-size: 12px; font-weight: 700;
  padding: 4px 8px; display: inline-block; border-radius: 0 0 8px 0;
  position: absolute; top: 0; left: 0;
}
.card-body { padding: 10px 10px 8px; flex: 1; margin-top: 22px; }
.card-name {
  font-size: 12px; color: var(--text); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 8px; min-height: 50px;
}
.card-price { font-size: 17px; font-weight: 700; color: var(--primary); }
.card-orig { font-size: 11px; color: var(--text2); text-decoration: line-through; margin-top: 1px; }
.card-time { font-size: 11px; color: var(--text2); margin-top: 6px; }
.card-footer { padding: 0 10px 10px; display: flex; flex-direction: column; gap: 6px; }
.btn-coupang {
  display: block; background: var(--primary); color: #fff; text-decoration: none;
  text-align: center; border-radius: 8px; padding: 8px; font-size: 13px; font-weight: 600;
}
.btn-tg {
  display: block; background: var(--primary-light); color: var(--primary); text-decoration: none;
  text-align: center; border-radius: 8px; padding: 6px; font-size: 12px; font-weight: 600;
}

/* ── 추천 배지 ── */
.card.recommended .card-badge { background: #f59e0b; }
.recommended-star {
  position: absolute; top: 0; right: 0;
  font-size: 16px; padding: 3px 6px;
}

/* ── 품절 / 가격변동 오버레이 ── */
.card.soldout::after,
.card.price_changed::after {
  content: attr(data-status-label);
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; letter-spacing: 2px; pointer-events: none;
}
.card.soldout { opacity: .55; }
.card.soldout::after { content: '품절'; color: #fff; background: rgba(0,0,0,.45); }
.card.price_changed { opacity: .6; }
.card.price_changed::after { content: '가격변동'; color: #fff; background: rgba(80,80,80,.45); font-size: 16px; }

/* 사선 패턴 */
.card.soldout::before, .card.price_changed::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -45deg, transparent, transparent 8px, rgba(0,0,0,.06) 8px, rgba(0,0,0,.06) 10px
  );
  pointer-events: none; z-index: 1;
}
.card.soldout::after, .card.price_changed::after { z-index: 2; }

/* ── 빈 상태 ── */
.empty {
  grid-column: 1/-1; text-align: center; padding: 60px 20px;
  color: var(--text2); font-size: 14px; line-height: 2;
}

/* ── 하단 고정 CTA ── */
.cta-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--tg); color: #fff; text-align: center;
  padding: 12px 16px; font-size: 14px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  text-decoration: none; z-index: 20;
}
.cta-bar svg { width: 20px; height: 20px; flex-shrink: 0; }
.content-wrap { padding-bottom: 56px; }

/* ── 파트너스 면책 ── */
.disclaimer {
  text-align: center; font-size: 11px; color: var(--text2);
  padding: 12px 16px 20px; line-height: 1.6;
}
</style>
</head>
<body>

<div class="content-wrap">

  <!-- 헤더 -->
  <header class="header">
    <div class="header-top">
      <div class="site-title"><span>💻</span> 노트북 핫딜 알리미</div>
      <a href="https://t.me/+GcPzFfpGyl5jMzM9" class="tg-btn" id="tg-header-btn"
         onclick="track('tg_header')">
        ✈ 채널 구독
      </a>
    </div>
    <nav class="tabs" role="tablist">
      <div class="tab active" data-tab="recommended" role="tab" onclick="switchTab(this)">⭐ 추천</div>
      <div class="tab" data-tab="new" role="tab" onclick="switchTab(this)">🆕 새상품</div>
      <div class="tab" data-tab="return" role="tab" onclick="switchTab(this)">📦 반품</div>
    </nav>
  </header>

  <p class="updated-bar" id="updated-bar">불러오는 중…</p>

  <!-- 딜 그리드 -->
  <main class="grid" id="grid" role="main"></main>

  <p class="disclaimer">
    이 페이지의 링크는 쿠팡 파트너스 활동의 일환으로,<br>
    구매 시 일정액의 수수료를 제공받습니다.
  </p>

</div>

<!-- 하단 고정 텔레그램 CTA -->
<a href="https://t.me/+GcPzFfpGyl5jMzM9" class="cta-bar" id="tg-footer-btn"
   onclick="track('tg_footer')">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.19 13.687l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.958.872z"/></svg>
  더 빠른 알림 → 텔레그램 채널 구독
</a>

<script>
// ── 설정 ──────────────────────────────────────────────────────────────────
const DEALS_URL   = 'https://raw.githubusercontent.com/doiedamji-svg/notebook-deals/main/deals.json';
const TG_CHANNEL  = 'https://t.me/+GcPzFfpGyl5jMzM9';  // 초대 링크로 교체
const REFRESH_MS  = 5 * 60 * 1000;  // 5분마다 새로고침

// ── 상태 ──────────────────────────────────────────────────────────────────
let currentTab = 'recommended';
let dealsData  = { recommended: [], new: [], return: [] };

// ── 탭 전환 ──────────────────────────────────────────────────────────────
function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = el.dataset.tab;
  renderGrid();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 시간 포맷 ─────────────────────────────────────────────────────────────
function timeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60)   return '방금 전';
  if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400)return `${Math.floor(diff/3600)}시간 전`;
  return `${Math.floor(diff/86400)}일 전`;
}

function fmtPrice(n) {
  return Number(n).toLocaleString('ko-KR') + '원';
}

// ── 카드 생성 ─────────────────────────────────────────────────────────────
function buildCard(deal) {
  const isRecommended = deal.is_recommended;
  const status = deal.status || 'active';
  const pct = deal.drop_pct ? `${deal.drop_pct.toFixed(1)}%↓` : '';
  const name = (deal.product_name || '').replace(/^\[반품\]\s*/, '');

  const card = document.createElement('div');
  card.className = `card${isRecommended ? ' recommended' : ''}${status !== 'active' ? ' ' + status : ''}`;

  card.innerHTML = `
    ${pct ? `<div class="card-badge">${pct}</div>` : ''}
    ${isRecommended ? '<div class="recommended-star">⭐</div>' : ''}
    <div class="card-body">
      <p class="card-name">${escHtml(name)}</p>
      <p class="card-price">${fmtPrice(deal.current_price)}</p>
      ${deal.original_price && deal.original_price > deal.current_price
        ? `<p class="card-orig">${fmtPrice(deal.original_price)}</p>` : ''}
      <p class="card-time">${timeAgo(deal.updated_at)}</p>
    </div>
    <div class="card-footer">
      <a href="${escHtml(deal.affiliate_url)}" class="btn-coupang"
         target="_blank" rel="noopener"
         onclick="track('coupang_click','${escHtml(deal.product_id)}')">
        🛒 쿠팡 바로가기
      </a>
      <a href="${escHtml(TG_CHANNEL)}" class="btn-tg"
         target="_blank" rel="noopener"
         onclick="track('tg_card')">
        ✈ 채널에서 더 빠르게
      </a>
    </div>`;
  return card;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 렌더 ──────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const items = dealsData[currentTab] || [];

  if (!items.length) {
    const em = document.createElement('div');
    em.className = 'empty';
    em.innerHTML = currentTab === 'recommended'
      ? '⭐<br>아직 추천 딜이 없어요.<br>관리자가 직접 선별한 딜이 여기 표시됩니다.'
      : '딜이 없습니다.<br>새 딜이 감지되면 자동으로 표시됩니다.';
    grid.appendChild(em);
    return;
  }

  const frag = document.createDocumentFragment();
  items.forEach(d => frag.appendChild(buildCard(d)));
  grid.appendChild(frag);
}

// ── 데이터 로드 ───────────────────────────────────────────────────────────
async function loadDeals() {
  try {
    const r = await fetch(DEALS_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    dealsData = data;

    const bar = document.getElementById('updated-bar');
    const d = new Date(data.updated_at);
    bar.textContent = `마지막 업데이트: ${d.toLocaleString('ko-KR', {timeZone:'Asia/Seoul'})}`;

    renderGrid();

    // 추천 탭에 내용 없으면 새상품으로 자동 이동 (첫 로드만)
    if (currentTab === 'recommended' && !data.recommended.length) {
      const tab = document.querySelector('[data-tab="return"]');
      if (tab) switchTab(tab);
    }
  } catch (e) {
    document.getElementById('updated-bar').textContent = '데이터를 불러오지 못했습니다.';
  }
}

// ── 클릭 트래킹 (Cloudflare Analytics 연동 예정) ─────────────────────────
function track(event, pid) {
  // Cloudflare Analytics beacon — 추후 활성화
  // if (window.cfAnalyticsBeaconToken) { ... }
}

// ── 초기화 ────────────────────────────────────────────────────────────────
loadDeals();
setInterval(loadDeals, REFRESH_MS);
</script>

</body>
</html>
